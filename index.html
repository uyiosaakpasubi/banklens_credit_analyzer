function renderMonthlyTable(monthly, totalCr, totalDr) {
  const totNet = totalCr - totalDr;
  const rows = monthly.map((m, i) => {
    const net = m.net;
    const netCls = net >= 0 ? 'g' : 'r';
    const prev = i > 0 ? monthly[i-1] : null;
    const crMom = prev && prev.cr > 0 ? ((m.cr - prev.cr) / prev.cr * 100) : null;
    const drMom = prev && prev.dr > 0 ? ((m.dr - prev.dr) / prev.dr * 100) : null;
    const crMomStr = crMom !== null ? `<span style="font-size:10px;color:${crMom>=0?'var(--green)':'var(--red)'}">${crMom>=0?'▲':'▼'}${Math.abs(crMom).toFixed(0)}%</span>` : '';
    const drMomStr = drMom !== null ? `<span style="font-size:10px;color:${drMom<=0?'var(--green)':'var(--red)'}">${drMom<=0?'▼':'▲'}${Math.abs(drMom).toFixed(0)}%</span>` : '';
    return `<tr>
      <td class="mt-lbl">${m.label}${i===0||i===monthly.length-1?'<span class="partial-tag">*</span>':''}</td>
      <td class="mt-num g">₦${fmtN(m.cr)} ${crMomStr}</td>
      <td class="mt-cnt">${m.crN}</td>
      <td class="mt-num r">₦${fmtN(m.dr)} ${drMomStr}</td>
      <td class="mt-cnt">${m.drN}</td>
      <td class="mt-num ${netCls}">${net>=0?'+':''}₦${fmtN(Math.abs(net))}</td>
      <td class="mt-cnt">${m.crN+m.drN}</td>
    </tr>`;
  }).join('');

  return `<div class="sbox" style="margin-bottom:20px">
    <div class="sbox-hdr">
      <div class="sbox-title">Monthly breakdown</div>
      <div class="sbox-meta">* partial month</div>
    </div>
    <div style="overflow-x:auto">
    <table class="mt">
      <thead><tr>
        <th class="mt-lbl">Month</th>
        <th class="mt-num">Total Credits (₦)</th>
        <th class="mt-cnt">Cr</th>
        <th class="mt-num">Total Debits (₦)</th>
        <th class="mt-cnt">Dr</th>
        <th class="mt-num">Net Flow (₦)</th>
        <th class="mt-cnt">Txns</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr>
        <td class="mt-lbl" style="font-weight:600">TOTAL</td>
        <td class="mt-num g" style="font-weight:600">₦${fmtN(totalCr)}</td>
        <td class="mt-cnt" style="font-weight:600">${monthly.reduce((s,m)=>s+m.crN,0)}</td>
        <td class="mt-num r" style="font-weight:600">₦${fmtN(totalDr)}</td>
        <td class="mt-cnt" style="font-weight:600">${monthly.reduce((s,m)=>s+m.drN,0)}</td>
        <td class="mt-num ${totNet>=0?'g':'r'}" style="font-weight:600">${totNet>=0?'+':''}₦${fmtN(Math.abs(totNet))}</td>
        <td class="mt-cnt" style="font-weight:600">${monthly.reduce((s,m)=>s+m.crN+m.drN,0)}</td>
      </tr></tfoot>
    </table>
    </div>
  </div>`;
}

function renderTransactions() {

      ${txnView==='individual' ? renderIndividualTxns(txns, cats) : renderMonthlyTable(monthly)}
    </div>`;
}

function renderIndividualTxns(txns, cats) {
  const filtered = txns
    .filter(t => txnFilter==='All' || t.cat===txnFilter)
    .filter(t => !txnSearch || t.narration.toLowerCase().includes(txnSearch.toLowerCase()))
    .sort((a,b)=>b.date-a.date);

  // Group by date
  const groups = {};
  for (const t of filtered) {
    const k = t.date.toISOString().slice(0,10);
    if (!groups[k]) groups[k]={ date:t.date, txns:[], total:0 };
    groups[k].txns.push(t);
    groups[k].total += t.credit - t.debit;
  }

  return `
    <div class="filter-bar">
      ${cats.map(c=>`<button class="fbtn ${txnFilter===c?'active':''}" data-cat="${c}">${c}</button>`).join('')}
    </div>
    <div class="search-wrap">
      <svg class="search-ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" placeholder="Search narrations…" id="txnSearchInp" value="${txnSearch}">
    </div>
    <div class="sbox">
      ${Object.values(groups).length===0
        ? `<div style="padding:28px;text-align:center;color:var(--dim);font-size:13px">No transactions match your filter.</div>`
        : Object.values(groups).map(g=>`
          <div class="txn-date-hdr">
            <span>${fmtDate(g.date)}</span>
            <span class="${g.total>=0?'np':'nn'}">${g.total<0?'-':''}₦${fmtN(Math.abs(g.total))}</span>
          </div>
          ${g.txns.map(t=>txnRow(t)).join('')}
        `).join('')
      }
    </div>`;
}

function renderMonthlyTable(monthly) {
  const keys = monthly.map(m=>m.key);
  const isPart = k => k===keys[0]||k===keys[keys.length-1];
  const totCr=monthly.reduce((s,m)=>s+m.cr,0), totDr=monthly.reduce((s,m)=>s+m.dr,0);
  const totCrN=monthly.reduce((s,m)=>s+m.crN,0), totDrN=monthly.reduce((s,m)=>s+m.drN,0);
  const totNet=totCr-totDr;

  return `
    <div class="sbox">
      <div class="sbox-hdr">
        <div class="sbox-title">Monthly Summary</div>
        <span class="sbox-meta">${monthly.length} months</span>
      </div>
      <div class="tscroll">
        <table>
          <thead><tr>
            <th style="text-align:left">Month</th>
            <th>Credits (₦)</th><th>Cr Txns</th>
            <th>Debits (₦)</th><th>Dr Txns</th>
            <th>Net Flow (₦)</th>
            <th>Largest Credit</th><th>Largest Debit</th>
          </tr></thead>
          <tbody>
          ${monthly.map(m=>{
            const nc=m.net>0.01?'np':m.net<-0.01?'nn':'nz';
            return `<tr class="${isPart(m.key)?'part':''}">
              <td>${m.label}${isPart(m.key)?' *':''}</td>
              <td class="cr">${fmtN(m.cr)}</td><td class="cnt">${m.crN}</td>
              <td class="dr">${fmtN(m.dr)}</td><td class="cnt">${m.drN}</td>
              <td class="${nc}">${m.net<0?'-':''}${fmtN(Math.abs(m.net))}</td>
              <td>${fmtN(m.crMax)}</td><td>${fmtN(m.drMax)}</td>
            </tr>`;
          }).join('')}
          </tbody>
          <tfoot><tr>
            <td>TOTAL</td>
            <td>${fmtN(totCr)}</td><td>${totCrN}</td>
            <td>${fmtN(totDr)}</td><td>${totDrN}</td>
            <td class="${totNet>0?'np':totNet<0?'nn':'nz'}">${totNet<0?'-':''}${fmtN(Math.abs(totNet))}</td>
            <td>—</td><td>—</td>
          </tr></tfoot>
        </table>
      </div>
    </div>`;
}

function txnRow(t) {
  const cfg = CAT_CFG[t.cat]||CAT_CFG.Other;
  const av  = avatarText(t.narration);
  const isCredit = t.credit > 0;
  const amt = isCredit ? t.credit : t.debit;
  return `<div class="txn-row">
    <div class="txn-avatar" style="background:${cfg.bg};color:${cfg.color}">${av}</div>
    <div class="txn-body">
      <div class="txn-name">${t.narration||'Transaction'}</div>

    <div class="txn-right">
      <div class="txn-amount ${isCredit?'cr':'dr'}">${isCredit?'+':'-'}₦${fmtN(amt)}</div>
      <div class="txn-cat">${t.cat}</div>
    </div>
  </div>`;
}

// ── Chart renderer ────────────────────────────────────────────────
function renderBarChart(monthly) {
  const data  = monthly.slice(-6);
  if (!data.length) return '<div style="height:120px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px">No data</div>';
  const maxVal = Math.max(...data.map(m=>Math.max(m.cr,m.dr)), 1);
  const chartH = 110, barW = 16, gap = 6, groupW = barW*2+gap, groupGap = 24;
  const totalW = data.length*(groupW+groupGap);

  const bars = data.map((m,i)=>{
    const x    = i*(groupW+groupGap);
    const crH  = Math.round((m.cr/maxVal)*chartH);
    const drH  = Math.round((m.dr/maxVal)*chartH);
    const lbl  = m.label.split(' ')[0];
    return `<g transform="translate(${x},0)">
      <rect x="0" y="${chartH-crH}" width="${barW}" height="${crH}" fill="var(--accent)" rx="2" opacity=".85"/>
      <rect x="${barW+gap}" y="${chartH-drH}" width="${barW}" height="${drH}" fill="#E2B8B0" rx="2"/>
      <text x="${groupW/2}" y="${chartH+16}" text-anchor="middle"
        font-size="10" fill="var(--dim)" font-family="IBM Plex Sans">${lbl}</text>
    </g>`;
  }).join('');

  return `<svg viewBox="0 0 ${totalW} ${chartH+28}" xmlns="http://www.w3.org/2000/svg"
    style="width:100%;height:auto;overflow:visible;display:block">${bars}</svg>`;
}

// ── Category breakdown ────────────────────────────────────────────
function renderCatBreakdown(catMap) {
  const total = Object.values(catMap).reduce((s,v)=>s+v,0);
  if (!total) return '<div style="font-size:12px;color:var(--dim)">No spending data.</div>';
  return Object.entries(catMap)
    .sort(([,a],[,b])=>b-a).slice(0,6)
    .map(([cat,amt])=>{
      const pct = Math.round(amt/total*100);
      const cfg = CAT_CFG[cat]||CAT_CFG.Other;
      return `<div class="cat-row">
        <div class="cat-name">${cat}</div>
        <div class="cat-track"><div class="cat-fill" style="width:${pct}%;background:${cfg.color};opacity:.7"></div></div>
        <div class="cat-amt">₦${fmtN(amt)}</div>
      </div>`;
    }).join('');
}

// ── Credit Analysis Engine ────────────────────────────────────────

const BETTING_PAT = /BET9JA|SPORTYBET|SPORTBET|1XBET|BETWAY|NAIRABET|BETNAIJA|BETKING|PARIMATCH|CLOUDBET|MSPORT|SUPABETS|BANGBET|ACCESSBET|\bBET\b|\bSTAKE\b|\bBETTING\b|\bGAMBL/i;
const ATM_PAT     = /\bATM\b|CASH\s*WITH|WITHDRAWAL|ATM\s*TRF|AUTOMATED\s*TELLER/i;
const LOAN_PAT    = /LOAN\s*REPAY|LOAN\s*DEDUCT|EMI\s*PAYMENT|CREDIT\s*REPAY|CREDIT\s*DEDUCT|LOAN\s*RECOVERY|OVERDUE\s*REPAY|LOAN\s*REDUC|REPAYMENT|AUTO\s*DEBIT.*LOAN|DEBIT.*LOAN/i;
const SALARY_PAT  = /SALARY|PAYROLL|STIPEND|PAYSTUB|\bWAGE\b|REMUNERATION|STAFF\s*PAY/i;
const WEB_PAT     = /WEB\s*PUR|ONLINE\s*PUR|E-COMMERCE|PAYSTACK|FLUTTERWAVE|PAYPAL|STRIPE|AMAZON|ALIEXPRESS|JUMIA|KONGA|SELAR|GUMROAD|SHOPIFY/i;
const SUPERMARKET_PAT = /SHOPRITE|SPAR|MARKET\s*SQUARE|GAME\s*STORE|PARK\s*N\s*SHOP|JUSTRITE|PRINCE\s*EBEANO|GROCERY|SUPERMARKET|HYPERMARKET/i;
const POS_PAT     = /\bPOS\b|\bPOS\s*TRF\b|POINT\s*OF\s*SALE/i;
const INTL_PAT    = /FOREIGN\s*CURR|FCY|USD|GBP|EUR|DOMICIL|\$\s*\d|£\s*\d|€\s*\d/i;
const SAVINGS_PAT = /PIGGYBANK|PIGGY\s*VEST|COWRYWISE|CASHBOX|OWEALTH|BAMBOO|RISEVEST|CARBON\s*SAVE|KUDA\s*SAVE/i;

function computeCreditProfile(txns, monthly, cs) {
  const totalCr = txns.reduce((s,t)=>s+t.credit,0);
  const totalDr = txns.reduce((s,t)=>s+t.debit,0);
  const avgMonthlyIncome = totalCr / (monthly.length||1);

  // ── Segment transactions ──────────────────────────────────────
  const betting    = txns.filter(t=>t.debit>0 && BETTING_PAT.test(t.narration));
  const atm        = txns.filter(t=>t.debit>0 && ATM_PAT.test(t.narration));
  const loans      = txns.filter(t=>t.debit>0 && LOAN_PAT.test(t.narration));
  const salaryIn   = txns.filter(t=>t.credit>0 && SALARY_PAT.test(t.narration));
  const webPurch   = txns.filter(t=>t.debit>0 && WEB_PAT.test(t.narration));
  const supermarket= txns.filter(t=>t.debit>0 && SUPERMARKET_PAT.test(t.narration));
  const pos        = txns.filter(t=>t.debit>0 && POS_PAT.test(t.narration) && !ATM_PAT.test(t.narration));
  const intl       = txns.filter(t=>t.debit>0 && INTL_PAT.test(t.narration));
  const savings    = txns.filter(t=>SAVINGS_PAT.test(t.narration));

  const sum = arr => arr.reduce((s,t)=>s+(t.debit||t.credit),0);

  // ── Salary regularity ─────────────────────────────────────────
  const salaryMonths = new Set(salaryIn.map(t=>mkKey(t.date)));
  const salaryPresent = salaryMonths.size;
  const salaryRegular = salaryIn.length > 0;
  const salaryAmounts = salaryIn.map(t=>t.credit);
  const salaryAvg = salaryAmounts.length ? salaryAmounts.reduce((s,v)=>s+v,0)/salaryAmounts.length : 0;
  const salaryVariance = salaryAmounts.length > 1 ?
    Math.sqrt(salaryAmounts.reduce((s,v)=>s+Math.pow(v-salaryAvg,2),0)/salaryAmounts.length)/salaryAvg : 0;

  // ── Income months (any credit month) ─────────────────────────
  const incomeMonths = new Set(txns.filter(t=>t.credit>0).map(t=>mkKey(t.date)));
  const incomeCoverage = Math.round(incomeMonths.size/monthly.length*100);

  // ── Cashflow consistency score (CV of monthly net) ────────────
  const nets = monthly.map(m=>m.cr-m.dr);
  const netAvg = nets.reduce((s,v)=>s+v,0)/(nets.length||1);
  const netCV  = nets.length>1 ?
    Math.sqrt(nets.reduce((s,v)=>s+Math.pow(v-netAvg,2),0)/nets.length)/Math.abs(netAvg||1) : 0;
  const consistencyScore = Math.max(0, Math.round(100 - Math.min(netCV*100,100)));

  // ── Major single debits (>10% of avg monthly income) ─────────
  const majorThreshold = avgMonthlyIncome * 0.10;
  const majorDebits = txns
    .filter(t=>t.debit>majorThreshold && !LOAN_PAT.test(t.narration))
    .sort((a,b)=>b.debit-a.debit).slice(0,10);

  // ── Compute flags ─────────────────────────────────────────────
  const flags = [];
  const bettingTotal = sum(betting);
  const atmTotal     = sum(atm);
  const loanTotal    = sum(loans);
  const bettingPct   = avgMonthlyIncome>0 ? Math.round(bettingTotal/avgMonthlyIncome*100) : 0;
  const atmPct       = totalDr>0 ? Math.round(atmTotal/totalDr*100) : 0;
  const loanMonthly  = loanTotal/(monthly.length||1);

  if (betting.length>0) flags.push({
    sev:'critical', title:'Gambling / Betting Detected',
    note:`${betting.length} betting transactions totalling ₦${fmtN(bettingTotal)} — ${bettingPct}% of average monthly income.`,
    amount:bettingTotal, amtCls:'r',
  });

  if (atmPct>35) flags.push({
    sev:'warning', title:'High Cash Withdrawal Ratio',
    note:`ATM withdrawals account for ${atmPct}% of total debits (₦${fmtN(atmTotal)}). Cash-heavy behaviour reduces spend traceability.`,
    amount:atmTotal, amtCls:'a',
  });

  if (loans.length>0) flags.push({
    sev:'critical', title:'Undisclosed Loan Repayments',
    note:`${loans.length} loan repayment entries detected. Monthly obligation approximately ₦${fmtN(loanMonthly)}. Verify if disclosed on application.`,
    amount:loanTotal, amtCls:'r',
  });

  if (salaryRegular && salaryPresent < monthly.length * 0.7) flags.push({
    sev:'warning', title:'Inconsistent Salary Credits',
    note:`Salary found in only ${salaryPresent} of ${monthly.length} months. Income reliability risk — verify employment status.`,
    amount:salaryAvg, amtCls:'a',
  });

  if (incomeCoverage < 80) flags.push({
    sev:'warning', title:'Income Gaps Detected',
    note:`Credits recorded in only ${incomeCoverage}% of statement months. ${monthly.length - incomeMonths.size} months had zero credit entries.`,
    amount:0, amtCls:'a',
  });

  if (intl.length>0) flags.push({
    sev:'info', title:'Foreign Currency Transactions',
    note:`${intl.length} international/FCY purchase(s) detected. Indicates potential dollar-denominated exposure.`,
    amount:sum(intl), amtCls:'a',
  });

  if (savings.length>0) flags.push({
    sev:'info', title:'Active Savings Behaviour',
    note:`${savings.length} savings platform transaction(s) — ${SAVINGS_PAT.source.replace(/[\\\|]/g,', ').slice(0,60)}…`,
    amount:sum(savings), amtCls:'g',
  });

  // ── Overall risk level ────────────────────────────────────────
  const criticals = flags.filter(f=>f.sev==='critical').length;
  const warnings  = flags.filter(f=>f.sev==='warning').length;
  const riskLevel = criticals>=2 ? 'high' : criticals>=1 || warnings>=2 ? 'medium' : 'low';
  const riskLabel = {low:'Low Risk',medium:'Moderate Risk',high:'Elevated Risk'}[riskLevel];
  const riskDesc  = {
    low:'No major behavioural red flags detected. Cashflow pattern appears consistent with stated income.',
    medium:'One or more risk factors identified. Further verification recommended before credit approval.',
    high:'Multiple risk factors detected. Manual review required. Credit decision should not proceed without additional documentation.',
  }[riskLevel];

  return {
    riskLevel, riskLabel, riskDesc, flags,
    consistencyScore, incomeCoverage,
    betting, bettingTotal, bettingPct,
    atm, atmTotal, atmPct,
    loans, loanTotal, loanMonthly,
    salaryIn, salaryPresent, salaryAvg, salaryVariance,
    webPurch, supermarket, pos, intl, savings,
    majorDebits, majorThreshold,
    avgMonthlyIncome, totalCr, totalDr, monthly,
  };
}

// ── Credit Profile Page ───────────────────────────────────────────
function renderCredit() {
  const { txns, monthly, cs, fmt, fname } = state;
  const cp = computeCreditProfile(txns, monthly, cs);
  const { riskLevel, riskLabel, riskDesc, flags, consistencyScore, incomeCoverage,
    betting, bettingTotal, bettingPct, atm, atmTotal, atmPct,
    loans, loanTotal, loanMonthly, salaryIn, salaryPresent, salaryAvg, salaryVariance,
    webPurch, supermarket, pos, intl, savings, majorDebits, majorThreshold, avgMonthlyIncome } = cp;

  const riskIcon = {low:'✓',medium:'!',high:'✗'}[riskLevel];

  // ── Behaviour grid cards ──────────────────────────────────────
  const behCards = [
    {
      label:'Gambling / Betting',
      val: betting.length>0 ? `₦${fmtN(bettingTotal)}` : '₦0.00',
      sub: betting.length>0 ? `${betting.length} transactions · ${bettingPct}% of income` : 'No betting detected',
      status: betting.length>0 ? 'flagged' : 'good',
      badge: betting.length>0 ? 'FLAGGED' : 'CLEAR',
    },
    {
      label:'ATM / Cash Withdrawals',
      val:`₦${fmtN(atmTotal)}`,
      sub:`${atmPct}% of total debits · ${atm.length} withdrawals`,
      status: atmPct>35 ? 'flagged' : atmPct>20 ? 'caution' : 'good',
      badge: atmPct>35 ? 'HIGH' : atmPct>20 ? 'MODERATE' : 'LOW',
    },
    {
      label:'Loan Repayments',
      val: loans.length>0 ? `₦${fmtN(loanMonthly)}/mo` : '₦0.00',
      sub: loans.length>0 ? `${loans.length} entries · ₦${fmtN(loanTotal)} total` : 'None detected',
      status: loans.length>0 ? 'flagged' : 'good',
      badge: loans.length>0 ? 'DETECTED' : 'NONE',
    },
    {
      label:'Web / Online Purchases',
      val:`₦${fmtN(webPurch.reduce((s,t)=>s+t.debit,0))}`,
      sub:`${webPurch.length} transactions`,
      status:'good', badge:'INFO',
    },
    {
      label:'Supermarket / Grocery',
      val:`₦${fmtN(supermarket.reduce((s,t)=>s+t.debit,0))}`,
      sub:`${supermarket.length} transactions`,
      status:'good', badge:'INFO',
    },
    {
      label:'POS Transactions',
      val:`₦${fmtN(pos.reduce((s,t)=>s+t.debit,0))}`,
      sub:`${pos.length} POS entries`,
      status:'good', badge:'INFO',
    },
    {
      label:'International / FCY',
      val:`₦${fmtN(intl.reduce((s,t)=>s+t.debit,0))}`,
      sub:`${intl.length} foreign transactions`,
      status: intl.length>0 ? 'caution' : 'good',
      badge: intl.length>0 ? 'PRESENT' : 'NONE',
    },
    {
      label:'Savings Platforms',
      val:`₦${fmtN(savings.reduce((s,t)=>s+(t.debit||t.credit),0))}`,
      sub:`${savings.length} savings transactions`,
      status: savings.length>0 ? 'good' : 'good',
      badge: savings.length>0 ? 'ACTIVE' : 'NONE',
    },
  ];

  // ── Salary stability chart ────────────────────────────────────
  const maxSal = salaryIn.length>0 ? Math.max(...salaryIn.map(t=>t.credit)) : avgMonthlyIncome;
  const salaryByMonth = {};
  for (const t of salaryIn) salaryByMonth[mkKey(t.date)] = t.credit;
  const salaryRows = monthly.map(m=>{
    const sal = salaryByMonth[m.key];
    const pct = sal ? Math.round(sal/maxSal*100) : 0;
    const present = !!sal;
    return `<div class="stability-row">
      <div class="stab-month">${m.label.split(' ')[0]} '${m.label.split(' ')[1].slice(2)}</div>
      <div class="stab-bar"><div class="stab-fill" style="width:${pct}%;background:${present?'var(--accent)':'var(--border)'}"></div></div>
      <div class="stab-amt">${sal?'₦'+fmtN(sal):'—'}</div>
      <div class="stab-status" style="background:${present?'var(--green-bg)':'var(--red-bg)'}">
        <span style="font-size:9px;color:${present?'var(--green)':'var(--red)'};">${present?'✓':'✗'}</span>
      </div>
    </div>`;
  }).join('');

  // ── Flagged txn lists ─────────────────────────────────────────
  const flagList = (arr, color, maxN=8) => arr.slice(0,maxN).map(t=>`
    <div class="txn-flag-row">
      <div class="tfr-dot" style="background:${color}"></div>
      <div class="tfr-narr">${t.narration||'Transaction'}</div>
      <div class="tfr-date">${fmtDate(t.date)}</div>
      <div class="tfr-amt" style="color:${color}">₦${fmtN(t.debit||t.credit)}</div>
    </div>`).join('') || `<div style="padding:14px 18px;font-size:12px;color:var(--dim)">None detected.</div>`;

  return `
    <div class="pg-eyebrow">Credit · ${FNAMES[fmt]||fmt}</div>
    <div class="pg-title">Credit Profile.</div>
    <div class="pg-sub">Behavioural analysis of ${txns.length.toLocaleString()} transactions across ${monthly.length} months.</div>

    <div class="risk-banner ${riskLevel}">
      <div class="risk-icon ${riskLevel}">${riskIcon}</div>
      <div class="risk-text">
        <h3 class="${riskLevel}">${riskLabel}</h3>
        <p>${riskDesc}</p>
      </div>
      <div style="margin-left:auto;text-align:center;flex-shrink:0;padding-left:16px">
        <div style="font-family:var(--mono);font-size:32px;font-weight:600;line-height:1;color:${riskLevel==='low'?'var(--green)':riskLevel==='medium'?'var(--amber)':'var(--red)'}">${consistencyScore}</div>
        <div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-top:3px">Consistency</div>
      </div>
    </div>

    ${flags.length>0 ? `
    <div class="sbox" style="margin-bottom:20px">
      <div class="sbox-hdr"><div class="sbox-title">Risk flags</div><div class="sbox-meta">${flags.length} item${flags.length!==1?'s':''}</div></div>
      ${flags.map(f=>`
        <div class="flag-row">
          <div class="flag-sev ${f.sev}"></div>
          <div class="flag-body">
            <div class="flag-title">${f.title}</div>
            <div class="flag-note">${f.note}</div>
          </div>
          ${f.amount>0?`<div class="flag-amount ${f.amtCls}">₦${fmtN(f.amount)}</div>`:''}
        </div>`).join('')}
    </div>` : `<div class="sbox" style="margin-bottom:20px"><div style="padding:18px;font-size:13px;color:var(--green)">✓ No risk flags detected.</div></div>`}

    <div class="sec-label">Behavioural breakdown</div>
    <div class="beh-grid">
      ${behCards.map(c=>`
        <div class="beh-card ${c.status}">
          <div class="beh-header">
            <div class="beh-label">${c.label}</div>
            <div class="beh-badge ${c.status}">${c.badge}</div>
          </div>
          <div class="beh-val">${c.val}</div>
          <div class="beh-sub">${c.sub}</div>
        </div>`).join('')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
      ${betting.length>0 ? `
      <div class="sbox">
        <div class="sbox-hdr"><div class="sbox-title">Betting transactions</div><div class="sbox-meta" style="color:var(--red)">${betting.length} entries · ₦${fmtN(bettingTotal)}</div></div>
        ${flagList(betting,'var(--red)')}
      </div>` : ''}

      ${atm.length>0 ? `
      <div class="sbox">
        <div class="sbox-hdr"><div class="sbox-title">ATM / Cash withdrawals</div><div class="sbox-meta">${atm.length} withdrawals · ${atmPct}% of debits</div></div>
        ${flagList(atm,'var(--amber)')}
      </div>` : ''}

      ${loans.length>0 ? `
      <div class="sbox">
        <div class="sbox-hdr"><div class="sbox-title">Loan repayments</div><div class="sbox-meta" style="color:var(--red)">${loans.length} entries · ₦${fmtN(loanMonthly)}/mo avg</div></div>
        ${flagList(loans,'var(--red)')}
      </div>` : ''}

      ${webPurch.length>0 ? `
      <div class="sbox">
        <div class="sbox-hdr"><div class="sbox-title">Web / online purchases</div><div class="sbox-meta">${webPurch.length} transactions</div></div>
        ${flagList(webPurch,'var(--accent)',6)}
      </div>` : ''}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
      <div class="sbox">
        <div class="sbox-hdr">
          <div class="sbox-title">Salary / income regularity</div>
          <div class="sbox-meta">${salaryPresent}/${monthly.length} months</div>
        </div>
        ${salaryIn.length>0 ? salaryRows : `<div style="padding:14px 18px;font-size:12px;color:var(--dim)">No salary credits detected. Total credits averaged ₦${fmtN(avgMonthlyIncome)}/month.</div>`}
      </div>

      <div class="sbox">
        <div class="sbox-hdr">
          <div class="sbox-title">Major single debits</div>
          <div class="sbox-meta">> ₦${fmtN(majorThreshold)} threshold</div>
        </div>
        ${majorDebits.length>0
          ? majorDebits.map(t=>`
            <div class="txn-flag-row">
              <div class="tfr-dot" style="background:var(--red);opacity:.7"></div>
              <div class="tfr-narr">${t.narration||'Transaction'}</div>
              <div class="tfr-date">${fmtDate(t.date)}</div>
              <div class="tfr-amt" style="color:var(--red)">₦${fmtN(t.debit)}</div>
            </div>`).join('')
          : `<div style="padding:14px 18px;font-size:12px;color:var(--dim)">No single transaction exceeded ${Math.round(10)}% of average monthly income.</div>`}
      </div>
    </div>

    <div style="padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:11px;color:var(--dim);line-height:1.7">
      <strong style="color:var(--text);font-weight:500">Disclaimer:</strong> This Credit Profile is a pattern-analysis aid based on transaction narration matching. It is not a credit bureau report and does not constitute a credit decision. Analysts should verify all flags independently and apply institutional credit policy. Consistency score reflects cashflow predictability, not creditworthiness.
    </div>`;
}

// ── Page renderer ─────────────────────────────────────────────────
function renderPage(page) {
  const el = $('mainArea');
  if (!el) return;
  switch(page) {
    case 'overview':     el.innerHTML = state ? renderOverview()     : renderUpload(); break;
    case 'transactions': el.innerHTML = state ? renderTransactions()  : renderUpload(); break;
    case 'insights':     el.innerHTML = state ? renderInsights()      : renderUpload(); break;
    case 'credit':       el.innerHTML = state ? renderCredit()       : renderUpload(); break;
    default:             el.innerHTML = renderUpload(); break;
  }
  attachPageEvents(page);
}

function attachPageEvents(page) {
  // Upload page
  const dz=$('dropZone'), fin=$('fileIn');
  if (dz) {
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
    dz.addEventListener('drop',e=>{
      e.preventDefault(); dz.classList.remove('over');
      const f=e.dataTransfer.files[0];
      if(f?.type==='application/pdf') analyse(f);
      else { const eb=$('errBox'); if(eb){eb.textContent='⚠ Please provide a PDF file.';eb.classList.add('vis');} }
    });
  }
  if (fin) fin.addEventListener('change',e=>{ if(e.target.files[0]) analyse(e.target.files[0]); });

  // Overview page
  const dlX=$('dlXLSX'), dlC=$('dlCSV');
  if (dlX) dlX.addEventListener('click',()=>dlXLSX());
  if (dlC) dlC.addEventListener('click',()=>dlCSV());

  // Transactions page — view toggle
  const vtI=$('vtInd'), vtM=$('vtMon');
  if (vtI) vtI.addEventListener('click',()=>{ txnView='individual'; renderPage('transactions'); updateNav('transactions'); });
  if (vtM) vtM.addEventListener('click',()=>{ txnView='monthly'; renderPage('transactions'); updateNav('transactions'); });

  // Transactions filter buttons
  document.querySelectorAll('.fbtn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      txnFilter=btn.dataset.cat;
      const content=$('txnContent');
      if(content && state) {
        const cats=['All',...new Set(state.txns.map(t=>t.cat))].sort();
        content.innerHTML=renderIndividualTxns(state.txns, cats);
        attachPageEvents('transactions');
      }
    });
  });

  // Search
  const srch=$('txnSearchInp');
  if (srch) {
    srch.addEventListener('input',e=>{
      txnSearch=e.target.value;
      const content=$('txnContent');
      if(content && state) {
        const cats=['All',...new Set(state.txns.map(t=>t.cat))].sort();
        content.innerHTML=renderIndividualTxns(state.txns, cats);
        attachPageEvents('transactions');
      }
    });
  }
}

// ── Nav & global events ───────────────────────────────────────────
document.querySelectorAll('.s-nav-item').forEach(item=>{
  item.addEventListener('click',()=>navigate(item.dataset.page));
});

$('sUploadBtn').addEventListener('click',()=>{
  state=null; txnView='individual'; txnFilter='All'; txnSearch='';
  navigate('upload');
});

// ── Init ──────────────────────────────────────────────────────────
const initPage = location.hash.slice(1) || 'upload';
renderPage(initPage);
updateNav(initPage);
</script>
